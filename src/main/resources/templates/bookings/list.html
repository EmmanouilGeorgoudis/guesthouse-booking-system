<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Booking</title></head>
<body>
<nav>
    <a th:href="@{/}">Home</a> |
    <a th:href="@{/customers}">Customers</a> |
    <a th:href="@{/rooms}">Room</a>
</nav>
<h1>Bookings</h1>

<div th:if="${successMessage}" th:text="${successMessage}" style="color:green;"></div>
<div th:if="${errorMessage}" th:text="${errorMessage}" style="color:red;"></div>

<a th:href="@{/bookings/new}">New booking</a>

<table border="1">
    <tr>
        <th>Customer ID</th>
        <th>Room ID</th>
        <th>Checkin</th>
        <th>Checkout</th>
        <th>Handle booking</th>
    </tr>
    <tr th:each="booking : ${bookings}">
        <td th:text="${booking.customerId}"></td>
        <td th:text="${booking.roomId}"></td>
        <td th:text="${booking.checkIn}"></td>
        <td th:text="${booking.checkOut}"></td>
        <td>
            <a th:href="@{/bookings/edit/{id}(id=${booking.id})}">Edit</a>
            <form th:action="@{/bookings/delete/{id}(id=${booking.id})}" method="post" style="display:inline;">
                <button type="submit" onclick="return confirm('Cancel booking?')">Cancel booking</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
